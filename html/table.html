<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Shanghai Rummy - Table</title>
<link rel="stylesheet" href="../css/table.css" />
</head>
<body>
  <div id="table-container">
    <!-- Draw and discard piles -->
    <div id="drawPile" class="pile"></div>
    <div id="discardPile" class="pile">Discard</div>
    <!-- Containers for players and contracts -->
    <div id="playersContainer"></div>
    <div id="contractsContainer"></div>
  </div>

  <!-- CHANGED: Single module entry point -->
  <script type="module" src="../js/tableCoordinator.js"></script>
  
  <!-- CHANGED: Module script to initialize -->
  <script type="module">
    import { initTable } from '../js/tableCoordinator.js';
    
    const gs = localStorage.getItem('gameSetup');
    let setup;
    try {
      setup = JSON.parse(gs);
      initTable(../html/setup.playerNames);
    } catch (e) {
      console.error('Failed to load game setup:', e);
      window.location.href = '../html/setup.html';
    }
  </script>
</body>
</html>
