<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shanghai Rummy - Table</title>
  <link rel="stylesheet" href="table.css" />
</head>
<body>
  <div id="table-container">
    <div id="piles">
      <div id="drawPile">Draw</div>
      <div id="discardPile">Discard</div>
    </div>
    <div id="playersContainer"></div>
    <div id="contractsContainer"></div>
  </div>

  <!-- IMPORTANT: type="module" is required for ES6 modules -->
  <script type="module" src="tableCoordinator.js"></script>
  
  <!-- Initialization script (calls initTable from the module) -->
  <script type="module">
    import { initTable } from './tableCoordinator.js';
    
    // Get player names from URL or localStorage
    const urlParams = new URLSearchParams(window.location.search);
    const playersParam = urlParams.get('players');
    let playerNames = [];
    
    if (playersParam) {
      playerNames = playersParam.split(',');
    } else {
      // Fallback to localStorage
      const gs = localStorage.getItem('gameSetup');
      if (gs) {
        try {
          const setup = JSON.parse(gs);
          playerNames = setup.players || [];
        } catch {}
      }
    }
    
    if (playerNames.length > 0) {
      window.addEventListener('DOMContentLoaded', () => {
        initTable(playerNames);
      });
    } else {
      console.error('No players found. Redirecting to setup...');
      window.location.href = 'setup.html';
    }
  </script>
</body>
</html>
